version: "3"

tasks:
  sync:
    desc: Install dependencies from lockfile
    cmds:
      - uv sync

  check:
    desc: Run all checks
    deps:
      - lint
      - test
      - format

  lint:
    desc: Lint with ruff
    cmds:
      - uv run ruff check .

  format:
    desc: Format with ruff
    cmds:
      - uv run ruff format .

  test:
    desc: Run tests
    cmds:
      - uv run pytest

  run:
    desc: Run the gskill pipeline
    cmds:
      - uv run main.py run {{.CLI_ARGS}}

  tasks:
    desc: List SWE-smith tasks for a repo
    cmds:
      - uv run main.py tasks {{.CLI_ARGS}}

  repos:
    desc: List repos supported by SWE-smith
    cmds:
      - uv run main.py repos {{.CLI_ARGS}}
